version: "3.8"

services:
  db:
    image: postgres:15
    container_name: finly-db
    environment:
      POSTGRES_USER: finly_user
      POSTGRES_PASSWORD: finly123
      POSTGRES_DB: finly_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U finly_user -d finly_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: finly-backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data: